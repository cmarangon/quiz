<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History — Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Spectral:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --parch:#f3e3c3; --parch-dark:#e7d2a6; --sepia:#5b3a21; --ink:#3a2410;
    --gold:#c8962a; --burg:#7a2e2e; --green:#5a6b35;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Spectral',Georgia,serif; min-height:100vh; color:var(--ink);
    background:
      radial-gradient(circle at 25% 12%, rgba(120,80,40,.10), transparent 45%),
      radial-gradient(circle at 80% 85%, rgba(120,80,40,.14), transparent 45%),
      #2c1d10;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .scroll{
    position:relative;width:100%;max-width:430px;
    background:
      repeating-linear-gradient(0deg, rgba(120,80,40,.025) 0 2px, transparent 2px 4px),
      linear-gradient(180deg,var(--parch),var(--parch-dark));
    border:2px solid #b89b6a; border-radius:18px; padding:26px 22px 28px;
    box-shadow:0 22px 50px rgba(0,0,0,.55), inset 0 0 60px rgba(120,80,40,.18);
  }
  /* torn/aged edge accents */
  .scroll::before,.scroll::after{content:"";position:absolute;left:0;right:0;height:18px;background:linear-gradient(var(--parch-dark),transparent);opacity:.6}
  .scroll::before{top:-2px;transform:scaleY(-1)} .scroll::after{bottom:-2px}

  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .badge{
    display:inline-flex;align-items:center;gap:8px; font-family:'MedievalSharp',serif;
    background:var(--burg); color:var(--parch); padding:8px 16px;border-radius:6px;
    letter-spacing:1px; font-size:15px; border:2px solid var(--gold);
    box-shadow:0 3px 0 rgba(0,0,0,.3);
  }
  .player-name{font-family:'MedievalSharp',serif;font-size:16px;color:var(--sepia)}

  .laurel{text-align:center;font-size:24px;color:var(--gold);letter-spacing:8px;margin:4px 0 14px}

  .timer{
    width:72px;height:72px;margin:0 auto 18px;border-radius:50%;
    display:grid;place-items:center;font-family:'MedievalSharp',serif;font-size:26px;color:var(--parch);
    background:radial-gradient(circle at 35% 30%,#caa14a,#8a5a1e);
    border:3px solid var(--ink); box-shadow:0 5px 0 rgba(0,0,0,.3);
  }

  .qcard{text-align:center;margin-bottom:22px}
  .qcard .emoji{font-size:38px}
  .qcard h2{font-family:'MedievalSharp',serif;font-size:24px;line-height:1.35;color:var(--sepia);margin-top:6px}

  .options{display:flex;flex-direction:column;gap:13px}
  .opt{
    font-family:'Spectral',serif;font-weight:600;font-size:18px;cursor:pointer;text-align:left;
    display:flex;align-items:center;gap:14px; color:var(--ink);
    background:linear-gradient(180deg,#fbf1d8,#ecdab0);
    border:2px solid var(--sepia); border-radius:10px; padding:16px 18px;
    box-shadow:0 4px 0 var(--sepia); transition:transform .08s,box-shadow .08s;
  }
  .opt:active{transform:translateY(3px);box-shadow:0 1px 0 var(--sepia)}
  .opt .key{
    flex:0 0 36px;width:36px;height:36px;border-radius:8px;display:grid;place-items:center;
    font-family:'MedievalSharp',serif;font-size:18px;color:var(--parch);background:var(--burg);border:1px solid var(--gold)
  }
  .opt:nth-child(2) .key{background:var(--green)}
  .opt:nth-child(3) .key{background:var(--sepia)}
  .opt:nth-child(4) .key{background:var(--gold);color:var(--ink)}

  .seal{position:absolute;right:-10px;bottom:-10px;width:64px;height:64px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#a13b3b,#641f1f);border:3px solid #4a1414;
    display:grid;place-items:center;color:#f0d9a0;font-family:'MedievalSharp',serif;font-size:26px;
    box-shadow:0 6px 14px rgba(0,0,0,.5);transform:rotate(-12deg)}
  .hint{text-align:center;font-size:13px;color:var(--sepia);opacity:.75;margin-top:16px;font-style:italic}
</style>
</head>
<body>
  <div class="scroll">
    <div class="topbar">
      <span class="badge">⚜ History</span>
      <span class="player-name">Sir Cedric</span>
    </div>

    <div class="laurel">❧ ⚜ ❧</div>
    <div class="timer">18</div>

    <div class="qcard">
      <span class="emoji">🏛️</span>
      <h2>In which year did the Berlin Wall fall?</h2>
    </div>

    <div class="options">
      <button class="opt"><span class="key">A</span> 1987</button>
      <button class="opt"><span class="key">B</span> 1989</button>
      <button class="opt"><span class="key">C</span> 1991</button>
      <button class="opt"><span class="key">D</span> 1993</button>
    </div>

    <p class="hint">Choose wisely, the chronicles are watching.</p>
    <div class="seal">✶</div>
  </div>
</body>
</html>
