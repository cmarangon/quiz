<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pop Culture — Spectator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{--pink:#ff3d9a;--cyan:#22e0e0;--yellow:#ffe14d;--purple:#9b5cff;--ink:#1a1030}
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Nunito',system-ui,sans-serif;color:#fff;min-height:100vh;overflow:hidden;
    background:
      radial-gradient(circle at 12% 16%, rgba(255,61,154,.45), transparent 38%),
      radial-gradient(circle at 88% 80%, rgba(34,224,224,.42), transparent 40%),
      linear-gradient(160deg,#3a1066,#160a33);
    padding:38px 56px;display:flex;flex-direction:column;
  }
  body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.12;
    background-image:radial-gradient(#fff 2px,transparent 2.2px);background-size:18px 18px}
  .burst{position:fixed;font-family:'Bangers';opacity:.85;text-shadow:4px 4px 0 var(--ink)}
  .burst.b1{top:7%;left:4%;font-size:70px;color:var(--cyan);transform:rotate(-12deg)}
  .burst.b2{bottom:7%;right:5%;font-size:64px;color:var(--pink);transform:rotate(10deg)}

  header{display:flex;align-items:center;justify-content:space-between;z-index:2}
  .badge{
    font-family:'Bangers';letter-spacing:2px;font-size:34px;background:var(--pink);color:#fff;
    padding:12px 30px;border-radius:18px;border:4px solid var(--ink);box-shadow:6px 6px 0 var(--ink);transform:rotate(-3deg)
  }
  .meta{display:flex;gap:16px}
  .pill{font-family:'Bangers';letter-spacing:1px;font-size:22px;background:var(--yellow);color:var(--ink);
    padding:10px 22px;border-radius:14px;border:4px solid var(--ink);box-shadow:4px 4px 0 var(--ink)}
  .pill.cy{background:var(--cyan)}

  main{flex:1;display:flex;flex-direction:column;justify-content:center;gap:40px;z-index:2}
  .question{
    margin:0 auto;max-width:1100px;text-align:center;background:#fff;color:var(--ink);
    border:5px solid var(--ink);border-radius:26px;padding:30px 40px;box-shadow:10px 10px 0 var(--ink);position:relative
  }
  .question::after{content:"";position:absolute;left:70px;bottom:-26px;border:20px solid transparent;border-top-color:#fff;filter:drop-shadow(0 6px 0 var(--ink))}
  .question .emoji{font-size:.8em;display:block;margin-bottom:6px}
  .question h1{font-family:'Bangers';letter-spacing:1.5px;font-size:clamp(34px,4.5vw,60px);line-height:1.1}

  .options{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:1100px;margin:0 auto;width:100%}
  .opt{
    font-family:'Bangers';letter-spacing:1.5px;font-size:clamp(24px,2.6vw,36px);color:#fff;
    border:5px solid var(--ink);border-radius:20px;padding:24px 28px;display:flex;align-items:center;gap:20px;
    box-shadow:7px 7px 0 var(--ink)
  }
  .opt .key{font-size:.7em;background:rgba(0,0,0,.22);padding:2px 16px;border-radius:10px}
  .opt.a{background:var(--pink)} .opt.b{background:var(--cyan);color:var(--ink)}
  .opt.c{background:var(--purple)} .opt.d{background:var(--yellow);color:var(--ink)}

  .timer{position:fixed;right:56px;top:50%;transform:translateY(-50%) rotate(5deg);z-index:2;
    font-family:'Bangers';font-size:48px;width:108px;height:108px;display:grid;place-items:center;border-radius:50%;
    background:var(--yellow);color:var(--ink);border:5px solid var(--ink);box-shadow:7px 7px 0 var(--ink)}
</style>
</head>
<body>
  <span class="burst b1">POW!</span>
  <span class="burst b2">★WOW★</span>

  <header>
    <span class="badge">★ Pop Culture</span>
    <div class="meta">
      <span class="pill">Track <b>3</b>/10</span>
      <span class="pill cy">👥 24 fans</span>
    </div>
  </header>

  <main>
    <div class="question">
      <span class="emoji">🎤</span>
      <h1>Which artist released the album "1989"?</h1>
    </div>
    <div class="options">
      <div class="opt a"><span class="key">A</span> Taylor Swift</div>
      <div class="opt b"><span class="key">B</span> Adele</div>
      <div class="opt c"><span class="key">C</span> Beyoncé</div>
      <div class="opt d"><span class="key">D</span> Rihanna</div>
    </div>
  </main>

  <div class="timer">18</div>
</body>
</html>
