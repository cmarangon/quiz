<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science — Spectator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--sci-bg1:#1b1145;--sci-bg2:#2d1b69;--sci-cyan:#22d3ee;--sci-lime:#a3e635;--sci-purple:#a855f7;--sci-pink:#f472b6;--ink:#0b1020}
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Fredoka',system-ui,sans-serif;color:#fff;min-height:100vh;
    background:
      radial-gradient(circle at 12% 20%, rgba(34,211,238,.22), transparent 38%),
      radial-gradient(circle at 88% 75%, rgba(168,85,247,.28), transparent 42%),
      linear-gradient(160deg,var(--sci-bg1),var(--sci-bg2));
    overflow:hidden; padding:40px 56px;
    display:flex;flex-direction:column;
  }
  .bubble{position:fixed;border-radius:50%;opacity:.4;animation:float 11s ease-in-out infinite}
  .bubble.b1{width:160px;height:160px;left:-50px;top:18%;background:radial-gradient(circle at 30% 30%,#67e8f9,#0891b2)}
  .bubble.b2{width:240px;height:240px;right:-80px;bottom:-40px;background:radial-gradient(circle at 30% 30%,#d8b4fe,#7e22ce);animation-delay:-4s}
  .bubble.b3{width:110px;height:110px;left:8%;bottom:14%;background:radial-gradient(circle at 30% 30%,#bef264,#65a30d);animation-delay:-6s}
  @keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-30px) rotate(14deg)}}

  header{display:flex;align-items:center;justify-content:space-between;z-index:2}
  .badge{
    display:inline-flex;align-items:center;gap:12px;background:rgba(34,211,238,.15);
    border:3px solid var(--sci-cyan);color:var(--sci-cyan);padding:12px 26px;border-radius:999px;
    font-weight:700;letter-spacing:1px;text-transform:uppercase;font-size:22px;
    box-shadow:0 0 26px rgba(34,211,238,.45);
  }
  .meta{display:flex;gap:18px;align-items:center}
  .pill{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);padding:10px 20px;border-radius:999px;font-weight:600;font-size:18px}
  .pill b{color:var(--sci-lime)}

  main{flex:1;display:flex;flex-direction:column;justify-content:center;gap:40px;z-index:2}
  .question{
    text-align:center;font-size:clamp(34px,5vw,64px);font-weight:700;line-height:1.15;
    max-width:1100px;margin:0 auto;text-shadow:0 4px 30px rgba(34,211,238,.25);
  }
  .question .emoji{font-size:.9em;display:block;margin-bottom:10px}

  .options{display:grid;grid-template-columns:1fr 1fr;gap:26px;max-width:1100px;margin:0 auto;width:100%}
  .opt{
    color:var(--ink);font-weight:600;font-size:clamp(22px,2.5vw,34px);
    padding:30px 34px;border-radius:26px;display:flex;align-items:center;gap:22px;
    box-shadow:0 10px 0 rgba(0,0,0,.28),0 22px 40px rgba(0,0,0,.32);
  }
  .opt .key{flex:0 0 56px;width:56px;height:56px;border-radius:16px;background:rgba(255,255,255,.5);display:grid;place-items:center;font-weight:700}
  .opt.a{background:linear-gradient(160deg,#67e8f9,#06b6d4)}
  .opt.b{background:linear-gradient(160deg,#d8b4fe,#a855f7);color:#fff}.opt.b .key{background:rgba(255,255,255,.35)}
  .opt.c{background:linear-gradient(160deg,#bef264,#84cc16)}
  .opt.d{background:linear-gradient(160deg,#fda4af,#fb7185);color:#fff}.opt.d .key{background:rgba(255,255,255,.35)}

  .timer-ring{
    position:fixed;right:56px;top:50%;transform:translateY(-50%);
    width:120px;height:120px;border-radius:50%;display:grid;place-items:center;
    background:conic-gradient(var(--sci-lime) 65%,rgba(255,255,255,.12) 0);box-shadow:0 0 30px rgba(163,230,53,.4);z-index:2
  }
  .timer-ring span{width:96px;height:96px;border-radius:50%;background:var(--sci-bg1);display:grid;place-items:center;font-size:44px;font-weight:700;color:var(--sci-lime)}
</style>
</head>
<body>
  <div class="bubble b1"></div><div class="bubble b2"></div><div class="bubble b3"></div>

  <header>
    <span class="badge">⚗️ Science Lab</span>
    <div class="meta">
      <span class="pill">Question <b>3</b> / 10</span>
      <span class="pill">👥 <b>24</b> answered</span>
    </div>
  </header>

  <main>
    <h1 class="question"><span class="emoji">🧪</span>What is the chemical symbol for Gold?</h1>
    <div class="options">
      <div class="opt a"><span class="key">A</span> Au</div>
      <div class="opt b"><span class="key">B</span> Ag</div>
      <div class="opt c"><span class="key">C</span> Gd</div>
      <div class="opt d"><span class="key">D</span> Go</div>
    </div>
  </main>

  <div class="timer-ring"><span>18</span></div>
</body>
</html>
