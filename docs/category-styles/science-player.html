<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science — Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sci-bg1:#1b1145; --sci-bg2:#2d1b69; --sci-cyan:#22d3ee; --sci-lime:#a3e635;
    --sci-purple:#a855f7; --sci-pink:#f472b6; --ink:#0b1020;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Fredoka',system-ui,sans-serif;
    min-height:100vh; color:#fff;
    background:
      radial-gradient(circle at 20% 15%, rgba(34,211,238,.25), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(168,85,247,.30), transparent 45%),
      linear-gradient(160deg,var(--sci-bg1),var(--sci-bg2));
    display:flex; align-items:center; justify-content:center; padding:20px;
    overflow-x:hidden;
  }
  /* floating molecule bubbles */
  .bubble{position:fixed;border-radius:50%;filter:blur(.4px);opacity:.5;animation:float 9s ease-in-out infinite}
  .bubble.b1{width:90px;height:90px;left:-20px;top:12%;background:radial-gradient(circle at 30% 30%,#67e8f9,#0891b2)}
  .bubble.b2{width:140px;height:140px;right:-40px;top:55%;background:radial-gradient(circle at 30% 30%,#d8b4fe,#7e22ce);animation-delay:-3s}
  .bubble.b3{width:60px;height:60px;left:12%;bottom:8%;background:radial-gradient(circle at 30% 30%,#bef264,#65a30d);animation-delay:-5s}
  @keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-26px) rotate(12deg)}}

  .phone{
    position:relative; width:100%; max-width:430px; z-index:2;
    display:flex; flex-direction:column; gap:22px;
  }
  .topbar{display:flex;align-items:center;justify-content:space-between}
  .badge{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(34,211,238,.15); border:2px solid var(--sci-cyan);
    color:var(--sci-cyan); padding:8px 16px;border-radius:999px;
    font-weight:600; letter-spacing:.5px; text-transform:uppercase; font-size:13px;
    box-shadow:0 0 18px rgba(34,211,238,.4);
  }
  .player-name{font-weight:600;font-size:15px;color:#c4b5fd}

  .timer{
    align-self:center; width:78px;height:78px;border-radius:50%;
    display:grid;place-items:center; font-size:30px;font-weight:700;
    background:conic-gradient(var(--sci-lime) 65%, rgba(255,255,255,.12) 0);
    box-shadow:0 0 22px rgba(163,230,53,.45);
  }
  .timer span{width:62px;height:62px;border-radius:50%;background:var(--sci-bg1);display:grid;place-items:center;color:var(--sci-lime)}

  .qcard{
    background:rgba(255,255,255,.07); backdrop-filter:blur(8px);
    border:2px solid rgba(255,255,255,.18); border-radius:26px;
    padding:26px 22px; text-align:center;
    box-shadow:0 18px 40px rgba(0,0,0,.35), inset 0 0 30px rgba(34,211,238,.06);
  }
  .qcard .emoji{font-size:42px;display:block;margin-bottom:8px}
  .qcard h2{font-size:23px;font-weight:600;line-height:1.3}

  .options{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .opt{
    position:relative; border:none; cursor:pointer;
    color:var(--ink); font-family:inherit; font-weight:600; font-size:17px;
    padding:22px 14px; border-radius:22px; text-align:left;
    display:flex;align-items:center;gap:12px;
    box-shadow:0 7px 0 rgba(0,0,0,.28), 0 14px 22px rgba(0,0,0,.28);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .opt:active{transform:translateY(5px);box-shadow:0 2px 0 rgba(0,0,0,.28),0 6px 12px rgba(0,0,0,.3)}
  .opt .key{
    flex:0 0 34px;width:34px;height:34px;border-radius:12px;
    background:rgba(255,255,255,.55); display:grid;place-items:center;
    font-weight:700;font-size:18px;
  }
  .opt.a{background:linear-gradient(160deg,#67e8f9,#06b6d4)}
  .opt.b{background:linear-gradient(160deg,#d8b4fe,#a855f7);color:#fff}
  .opt.b .key{background:rgba(255,255,255,.35)}
  .opt.c{background:linear-gradient(160deg,#bef264,#84cc16)}
  .opt.d{background:linear-gradient(160deg,#fda4af,#fb7185);color:#fff}
  .opt.d .key{background:rgba(255,255,255,.35)}

  .hint{text-align:center;font-size:13px;color:#a5b4fc;opacity:.8}
</style>
</head>
<body>
  <div class="bubble b1"></div><div class="bubble b2"></div><div class="bubble b3"></div>

  <div class="phone">
    <div class="topbar">
      <span class="badge">⚗️ Science</span>
      <span class="player-name">Dr. Nova</span>
    </div>

    <div class="timer"><span>18</span></div>

    <div class="qcard">
      <span class="emoji">🧪</span>
      <h2>What is the chemical symbol for Gold?</h2>
    </div>

    <div class="options">
      <button class="opt a"><span class="key">A</span> Au</button>
      <button class="opt b"><span class="key">B</span> Ag</button>
      <button class="opt c"><span class="key">C</span> Gd</button>
      <button class="opt d"><span class="key">D</span> Go</button>
    </div>

    <p class="hint">Tap your answer before the reaction completes!</p>
  </div>
</body>
</html>
