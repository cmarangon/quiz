<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>General Knowledge — Spectator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--ink:#15224a;--blue:#3b82f6;--red:#ef4444;--yellow:#f5b301;--green:#22b573;--indigo:#6366f1}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Baloo 2',system-ui,sans-serif;color:#fff;min-height:100vh;overflow:hidden;
    background:
      radial-gradient(circle at 12% 16%, rgba(99,102,241,.45), transparent 40%),
      radial-gradient(circle at 88% 80%, rgba(59,130,246,.42), transparent 42%),
      linear-gradient(160deg,#1e2a64,#101736);
    padding:38px 56px;display:flex;flex-direction:column}
  .q{position:fixed;font-weight:800;opacity:.15;color:#fff}
  .q.q1{top:8%;left:5%;font-size:120px;transform:rotate(-8deg)}.q.q2{bottom:8%;right:6%;font-size:150px;transform:rotate(10deg)}
  header{display:flex;align-items:center;justify-content:space-between;z-index:2}
  .badge{display:inline-flex;align-items:center;gap:12px;background:var(--indigo);color:#fff;padding:12px 28px;border-radius:18px;
    font-weight:700;font-size:26px;border:4px solid var(--ink);box-shadow:6px 6px 0 var(--ink)}
  .meta{display:flex;gap:16px}
  .pill{background:var(--yellow);color:var(--ink);padding:10px 22px;border-radius:14px;font-weight:700;font-size:20px;border:4px solid var(--ink);box-shadow:4px 4px 0 var(--ink)}
  .pill.b{background:#fff}
  main{flex:1;display:flex;flex-direction:column;justify-content:center;gap:40px;z-index:2}
  .question{margin:0 auto;max-width:1100px;text-align:center;background:#fff;color:var(--ink);
    border:5px solid var(--ink);border-radius:26px;padding:30px 40px;box-shadow:10px 10px 0 var(--ink)}
  .question .emoji{font-size:.8em;display:block;margin-bottom:6px}
  .question h1{font-weight:800;font-size:clamp(34px,4.6vw,60px);line-height:1.15}
  .options{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:1100px;margin:0 auto;width:100%}
  .opt{font-weight:700;font-size:clamp(24px,2.6vw,36px);color:#fff;border:5px solid var(--ink);border-radius:20px;
    padding:24px 28px;display:flex;align-items:center;gap:20px;box-shadow:7px 7px 0 var(--ink)}
  .opt .key{flex:0 0 56px;width:56px;height:56px;border-radius:14px;background:rgba(255,255,255,.28);display:grid;place-items:center}
  .opt.a{background:var(--red)} .opt.b{background:var(--blue)} .opt.c{background:var(--yellow);color:var(--ink)} .opt.d{background:var(--green)}
  .timer{position:fixed;right:56px;top:50%;transform:translateY(-50%);width:120px;height:120px;border-radius:50%;display:grid;place-items:center;z-index:2;
    background:conic-gradient(var(--yellow) 65%,rgba(255,255,255,.12) 0);box-shadow:0 0 30px rgba(245,179,1,.4)}
  .timer span{width:96px;height:96px;border-radius:50%;background:#1e2a64;display:grid;place-items:center;font-size:44px;font-weight:800;color:var(--yellow)}
</style>
</head>
<body>
  <span class="q q1">?</span><span class="q q2">?</span>
  <header>
    <span class="badge">💡 General Knowledge</span>
    <div class="meta">
      <span class="pill">Question <b>3</b>/10</span>
      <span class="pill b">👥 24 answered</span>
    </div>
  </header>
  <main>
    <div class="question">
      <span class="emoji">🧠</span>
      <h1>How many continents are there on Earth?</h1>
    </div>
    <div class="options">
      <div class="opt a"><span class="key">A</span> 5</div>
      <div class="opt b"><span class="key">B</span> 6</div>
      <div class="opt c"><span class="key">C</span> 7</div>
      <div class="opt d"><span class="key">D</span> 8</div>
    </div>
  </main>
  <div class="timer"><span>18</span></div>
</body>
</html>
