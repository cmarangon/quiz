<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>General Knowledge — Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--ink:#15224a;--blue:#3b82f6;--red:#ef4444;--yellow:#f5b301;--green:#22b573;--indigo:#6366f1}
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Baloo 2',system-ui,sans-serif;min-height:100vh;color:#fff;
    background:
      radial-gradient(circle at 18% 16%, rgba(99,102,241,.45), transparent 42%),
      radial-gradient(circle at 84% 82%, rgba(59,130,246,.40), transparent 44%),
      linear-gradient(160deg,#1e2a64,#101736);
    display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;
  }
  /* floating question marks + confetti */
  .q{position:fixed;font-weight:800;opacity:.18;color:#fff;animation:bob 8s ease-in-out infinite}
  .q.q1{top:10%;left:8%;font-size:60px}.q.q2{bottom:14%;right:9%;font-size:80px;animation-delay:-3s}.q.q3{top:46%;left:84%;font-size:40px;animation-delay:-5s}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-22px) rotate(8deg)}}

  .phone{position:relative;width:100%;max-width:430px;z-index:2;display:flex;flex-direction:column;gap:20px}
  .topbar{display:flex;align-items:center;justify-content:space-between}
  .badge{
    display:inline-flex;align-items:center;gap:8px;background:var(--indigo);color:#fff;
    padding:8px 18px;border-radius:14px;font-weight:700;letter-spacing:.5px;font-size:16px;
    border:3px solid var(--ink);box-shadow:4px 4px 0 var(--ink)
  }
  .player-name{font-weight:700;font-size:17px;color:#c7d2fe}

  .timer{align-self:center;width:78px;height:78px;border-radius:50%;display:grid;place-items:center;
    font-size:30px;font-weight:800;background:conic-gradient(var(--yellow) 65%,rgba(255,255,255,.12) 0);box-shadow:0 0 22px rgba(245,179,1,.4)}
  .timer span{width:62px;height:62px;border-radius:50%;background:#1e2a64;display:grid;place-items:center;color:var(--yellow)}

  .qcard{background:#fff;color:var(--ink);border:4px solid var(--ink);border-radius:22px;
    padding:24px 20px;text-align:center;box-shadow:7px 7px 0 var(--ink)}
  .qcard .emoji{font-size:42px}
  .qcard h2{font-size:24px;font-weight:700;line-height:1.25;margin-top:4px}

  .options{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .opt{font-family:inherit;font-weight:700;font-size:18px;cursor:pointer;color:#fff;
    border:4px solid var(--ink);border-radius:18px;padding:20px 14px;display:flex;align-items:center;gap:12px;text-align:left;
    box-shadow:5px 5px 0 var(--ink);transition:transform .07s,box-shadow .07s}
  .opt:active{transform:translate(3px,3px);box-shadow:2px 2px 0 var(--ink)}
  .opt .key{flex:0 0 32px;width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.28);display:grid;place-items:center;font-size:17px}
  .opt.a{background:var(--red)} .opt.b{background:var(--blue)} .opt.c{background:var(--yellow);color:var(--ink)} .opt.d{background:var(--green)}
  .hint{text-align:center;font-size:14px;color:#a5b4fc}
</style>
</head>
<body>
  <span class="q q1">?</span><span class="q q2">?</span><span class="q q3">?</span>
  <div class="phone">
    <div class="topbar">
      <span class="badge">💡 General Knowledge</span>
      <span class="player-name">Quiz Whiz</span>
    </div>
    <div class="timer"><span>18</span></div>
    <div class="qcard">
      <span class="emoji">🧠</span>
      <h2>How many continents are there on Earth?</h2>
    </div>
    <div class="options">
      <button class="opt a"><span class="key">A</span> 5</button>
      <button class="opt b"><span class="key">B</span> 6</button>
      <button class="opt c"><span class="key">C</span> 7</button>
      <button class="opt d"><span class="key">D</span> 8</button>
    </div>
    <p class="hint">Trust your gut — first answer's often right!</p>
  </div>
</body>
</html>
